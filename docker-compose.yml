version: "3.9"
services:
  app:
    build: .
    ports: ["8080:8080"]
    env_file: .env
    depends_on: [db]
  db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: biologus
    ports: ["5432:5432"]
    volumes:
      - dbdata:/var/lib/postgresql/data
      - ./database/database.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
volumes:
  dbdata:
